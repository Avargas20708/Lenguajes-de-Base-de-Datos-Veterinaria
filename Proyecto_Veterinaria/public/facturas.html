<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Facturas - Happy Pet</title><link rel="stylesheet" href="style.css"></head><body>
<header><h1>🧾 Facturas</h1><nav><a href="index.html">Inicio</a><a href="clientes.html">Clientes</a><a href="mascotas.html">Mascotas</a><a href="citas.html">Citas</a><a href="historial.html">Historial</a><a href="facturas.html">Facturas</a></nav></header>
<main class="container"><div id="mensaje" class="alert"></div><section class="card"><h2>Registrar / editar factura</h2><form id="formFactura"><div class="form-grid"><div class="form-group"><label for="id">ID</label><input type="number" id="id" min="1" required></div><div class="form-group"><label for="fecha">Fecha</label><input type="datetime-local" id="fecha" required></div><div class="form-group"><label for="total">Total</label><input type="number" id="total" min="0" step="0.01" required></div><div class="form-group"><label for="cliente_id">Cliente</label><select id="cliente_id" required></select></div></div><div class="actions"><button class="btn btn-primary" type="submit">Guardar factura</button><button class="btn btn-secondary" type="button" id="btnCancelar">Cancelar edición</button></div></form></section><section class="card"><h2>Facturas registradas</h2><div class="table-wrap"><table><thead><tr><th>ID</th><th>Fecha</th><th>Cliente</th><th>Total</th><th>Acciones</th></tr></thead><tbody id="tablaFacturas"></tbody></table></div></section></main>
<script src="js/api.js"></script><script src="js/facturas.js"></script></body></html>

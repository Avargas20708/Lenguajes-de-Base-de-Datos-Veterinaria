<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Historial Clínico - Happy Pet</title><link rel="stylesheet" href="style.css"></head><body>
<header><h1>🩺 Historial clínico</h1><nav><a href="index.html">Inicio</a><a href="clientes.html">Clientes</a><a href="mascotas.html">Mascotas</a><a href="citas.html">Citas</a><a href="historial.html">Historial</a><a href="facturas.html">Facturas</a></nav></header>
<main class="container"><div id="mensaje" class="alert"></div><section class="card"><h2>Registrar / editar historial</h2><form id="formHistorial"><div class="form-grid"><div class="form-group"><label for="id">ID</label><input type="number" id="id" min="1" required></div><div class="form-group"><label for="mascota_id">Mascota</label><select id="mascota_id" required></select></div><div class="form-group full"><label for="diagnostico">Diagnóstico</label><textarea id="diagnostico" maxlength="200" required></textarea></div><div class="form-group full"><label for="tratamiento">Tratamiento</label><textarea id="tratamiento" maxlength="200" required></textarea></div></div><div class="actions"><button class="btn btn-primary" type="submit">Guardar historial</button><button class="btn btn-secondary" type="button" id="btnCancelar">Cancelar edición</button></div></form></section><section class="card"><h2>Historiales registrados</h2><div class="table-wrap"><table><thead><tr><th>ID</th><th>Mascota</th><th>Dueño</th><th>Diagnóstico</th><th>Tratamiento</th><th>Acciones</th></tr></thead><tbody id="tablaHistorial"></tbody></table></div></section></main>
<script src="js/api.js"></script><script src="js/historial.js"></script></body></html>
